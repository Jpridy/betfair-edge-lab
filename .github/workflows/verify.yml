name: Verify App

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - fix/**

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "$code" > typecheck.exit
          cat typecheck.log
          exit "$code"

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          echo "$code" > lint.exit
          cat lint.log
          exit "$code"

      - name: Unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test > tests.log 2>&1
          code=$?
          echo "$code" > tests.exit
          cat tests.log
          exit "$code"

      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "$code" > build.exit
          cat build.log
          exit "$code"

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-logs
          path: |
            typecheck.log
            typecheck.exit
            lint.log
            lint.exit
            tests.log
            tests.exit
            build.log
            build.exit
          if-no-files-found: warn
          retention-days: 7

      - name: Verification gate
        if: always()
        shell: bash
        run: |
          failed=0
          for check in typecheck lint tests build; do
            code=$(cat "$check.exit" 2>/dev/null || echo 1)
            if [ "$code" != "0" ]; then
              echo "::error::$check failed with exit code $code"
              failed=1
            fi
          done
          exit "$failed"
