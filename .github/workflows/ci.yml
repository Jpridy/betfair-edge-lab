name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, fix/**]

permissions:
  contents: read

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build
